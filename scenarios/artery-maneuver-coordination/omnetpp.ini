[General]
network = artery.inet.World

sim-time-limit = 30 s
warmup-period = 5 s

*.traci.core.version = -1
*.traci.launcher.typename = "PosixLauncher"


*.node[*].wlan[*].typename = "VanetNic"


*.withPhysicalEnvironment = true
*.physicalEnvironment.groundType = "FlatGround"

*.withObstacles = true

**.ChannelLoad:vector.vector-recording = true
#**.Cam2Mac:vector.vector-recording = true
#**.McmReceivedCounter:vector.vector-recording = true
#**.McmSentCounter:vector.vector-recording = true
#**.packetErrorRate:vector.vector-recording = true
#**.radioChannel:vector.vector-recording = true
#**.LinkLatency:vector.vector-recording = true
#**.delayDcc:vector.vector-recording = true
**.vector-recording = false  # vector not being saved
**.result-recording-modes = all
**.scalar-recording = true

*.radioMedium.pathLossType = "Gemv2"     #  other option is "VanetNakagamiFading" or "TwoRayInterference" or "FreeSpacePathLoss" or "Gemv2"
*.radioMedium.pathLoss.withSmallScaleVariations = false
*.radioMedium.pathLoss.withVisualization = true

#DCC
*.node[*].vanetza[*].dcc.typename = "LimericDccEntity"    # options are LimericDccEntity, FsmDccEntity, NoRateControlDccEntity
*.node[*].vanetza[*].dcc.enableDualAlpha = true

[Config sumo-gui]
*.traci.launcher.sumo = "sumo-gui"

[Config envmod]

network = artery.envmod.World
*.traci.mapper.vehicleType = "artery.envmod.Car"
*.node[*].wlan[*].typename = "VanetNic"
# define two radios 
*.node[*].numRadios = 2

*.node[*].wlan[*].bitrate = 6 Mbps

*.node[*].wlan[*].radio.channelNumber = 180
*.node[*].wlan[*].radio.carrierFrequency = 5.9 GHz
*.node[*].wlan[*].radio.bandwidth = 10 MHz
*.node[*].wlan[*].radio.transmitter.power = 200 mW

*.node[*].middleware.updateInterval = 0.1s
*.node[*].middleware.datetime = "2018-03-19 10:00:00"
*.node[*].middleware.services = xmldoc("services-mco-envmod.xml")
*.node[*].middleware.MC.usePrerecordedIntentTrajectory = true
*.node[*].middleware.MC.prerecordedTrajectoryCsv = "coordinates_new_map.csv"
*.node[*].middleware.MC.prerecordedTrajectorySteps = 20
*.node[*].middleware.MC.prerecordedTrajectoryDt = 0.25s


*.node[*].environmentModel.sensors = xmldoc("sensors.xml")
*.node[*].environmentModel.FrontRadar.fovRange = 200.0 m
*.node[*].environmentModel.FrontRadar.fovAngle = 20.0

# security entity added 
*.node[*].vanetza[*].security.typename = "SecurityEntity"


seed-1-mt = ${seed=10, 20, 30, 40, 50}            # used for all  1, 11, 51, 101, 151

[Config envmod-19CAVs]
extends = envmod
*.traci.launcher.sumocfg = "routes/test_19CAVs.sumocfg"

[Config envmod-19CAVs-merging]
extends = envmod
*.traci.launcher.sumocfg = "routes/test_19CAVs_merging.sumocfg"

[Config envmod-19CAVs-merging-gui]
extends = envmod-19CAVs-merging
*.traci.launcher.sumo = "sumo-gui"

[Config envmod-19CAVs-emergency-lane-change]
extends = envmod
*.traci.launcher.sumocfg = "routes/test_19CAVs_emergency_lane_change.sumocfg"

[Config envmod-19CAVs-emergency-lane-change-gui]
extends = envmod-19CAVs-emergency-lane-change
*.traci.launcher.sumo = "sumo-gui"

[Config envmod-19CAVs-second-request-smoke]
extends = envmod-19CAVs-emergency-lane-change
# Optional validation-only config. It forces one selected CV to reject its
# first high-priority lane-change Request so the RV second-request path is
# exercised deterministically.
*.node[*].middleware.MC.forceFirstCvRejectForSecondRequestSmoke = true
*.node[*].middleware.MC.forceFirstCvRejectStationId = 309

[Config envmod-200CAVs]
extends = envmod
*.traci.launcher.sumocfg = "routes/test_200CAVs.sumocfg"

[Config envmod-200CAVs-qos-baseline-freespace]
extends = envmod-200CAVs
# Experimental congested QoS baseline. The existing 19 maneuver-coordination
# vehicles remain the coordination participants; additional CAVs are background
# load vehicles that transmit regular Intent MCMs using fallback trajectory
# columns (others_x/others_y = 1/1) where no route-specific CSV trajectory
# exists. With the two-service envmod service list they may also transmit CAMs.
# Background MCMs/CAMs are communication-load traffic, not coordination
# participants.
*.radioMedium.pathLossType = "FreeSpacePathLoss"
*.node[*].middleware.MC.newGenMcmRules = false
*.node[*].middleware.MC.newGenMcmRulesIntent = false
*.node[*].middleware.MC.newGenMcmRulesIntent1Hz_MCO = false
*.node[*].middleware.MC.dccProfiles = false

[Config envmod-200CAVs-qos-adapt-intent-freespace]
extends = envmod-200CAVs-qos-baseline-freespace
*.node[*].middleware.MC.newGenMcmRules = true
*.node[*].middleware.MC.newGenMcmRulesIntent = true
*.node[*].middleware.MC.newGenMcmRulesIntent1Hz_MCO = false
*.node[*].middleware.MC.dccProfiles = false

[Config envmod-200CAVs-qos-mco-1hz-freespace]
extends = envmod-200CAVs-qos-baseline-freespace
*.node[*].middleware.MC.newGenMcmRules = false
*.node[*].middleware.MC.newGenMcmRulesIntent = false
*.node[*].middleware.MC.newGenMcmRulesIntent1Hz_MCO = true
*.node[*].middleware.MC.dccProfiles = false

[Config envmod-200CAVs-qos-dcc-profiles-freespace]
extends = envmod-200CAVs-qos-baseline-freespace
*.node[*].middleware.MC.newGenMcmRules = false
*.node[*].middleware.MC.newGenMcmRulesIntent = false
*.node[*].middleware.MC.newGenMcmRulesIntent1Hz_MCO = false
*.node[*].middleware.MC.dccProfiles = true

[Config envmod-500CAVs]
extends = envmod
*.traci.launcher.sumocfg = "routes/test_500CAVs.sumocfg"

